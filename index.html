<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe Finder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h2 class="text-center mt-3 text-success">🍴 Recipe Finder App</h2>

<div class="container mt-4">

    <!-- Search -->
    <div class="input-group mb-4">
        <input type="text" id="searchText" class="form-control" placeholder="Enter recipe name" onkeyup="loadRecipe()"/>
        <button class="btn btn-success" onclick="loadRecipe()">Search</button>
    </div>

    <!-- Result -->
    <div class="row" id="recipeContainer"></div>

</div>

<script src="./Scripts/index.js"></script>

<script>
    function loadRecipe() {
        getData().then(data => {

            let container = document.getElementById("recipeContainer");
            container.innerHTML = "";

            if (data && data.meals) {

                data.meals.forEach(meal => {
                    container.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="${meal.strMealThumb}" class="card-img-top">
                                <div class="card-body">
                                    <h5 class="card-title">${meal.strMeal}</h5>
                                    <p class="card-text">
                                        Category: ${meal.strCategory}
                                    </p>
                                     <button class="btn btn-primary btn-sm" onclick="viewDetails('${meal.idMeal}')">
                                    View Details
                                </button>
                                </div>
                            </div>
                        </div>
                    `;
                });

            } else {
                container.innerHTML = "<h5>No recipe found!</h5>";
            }
        });
    }
    
    function viewDetails(idMeal) {
        getData().then(data => {

            let container = document.getElementById("recipeContainer");
            container.innerHTML = "";

            if (data && data.meals) {

              let meal=  data.meals.find(meal => meal.idMeal===idMeal);
              container.innerHTML = `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="${meal.strMealThumb}" class="card-img-top">
                                <div class="card-body">
                                    <h5 class="card-title">${meal.strMeal}</h5>
                                    <p class="card-text">
                                        Category: ${meal.strCategory}
                                    </p>
                                    <p> ${meal.strInstructions}</p>
                                     <button class="btn btn-primary btn-sm" onclick="loadRecipe()">
                                    Back
                                </button>
                                </div>
                            </div>
                        </div>
                    `;
               

            } else {
                container.innerHTML = "<h5>No recipe found!</h5>";
            }
        });
    }
</script>

</body>
</html>
